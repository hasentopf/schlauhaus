<html lang="de"><head><script>// Some devices, in our test case the iPad Air 3, formats unwanted heights without this tag
// Some devices, but not the iPad Air 3, could have issues as we only patch the meta tag later on and it's not there from the beginning, but we haven't seen those devices yet
let viewPortFound = false;
for (const metaElement of document.head.querySelectorAll('meta')) {
    if (metaElement.name === 'viewport') {
        viewPortFound = true;
        break;
    }
}
if (!viewPortFound) {
    const meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0';
    document.head.appendChild(meta);
}

const style = document.createElement('style');
document.head.appendChild(style);
const queryParameters = new URLSearchParams(window.location.search);
style.appendChild(document.createTextNode(`
:root {
  /* Colors */
  --accent-color: #${queryParameters.get('accentcolor')};
  --content-color: #${queryParameters.get('textcolor')};
  --card-color: #${queryParameters.get('cardcolor')};
}

/* Poppins Regular */

@font-face {
    font-family: "Poppins";
    src: url("/tile/assets/google_fonts/Poppins-Regular.ttf") format('truetype');
    font-weight: 400;
    font-style: normal;
}

/* Poppins italic */

@font-face {
    font-family: "Poppins";
    src: url("/tile/assets/google_fonts/Poppins-Italic.ttf") format('truetype');
    font-weight: 400;
    font-style: italic;
}

/* Poppins bold */

@font-face {
    font-family: "Poppins";
    src: url("/tile/assets/google_fonts/Poppins-Bold.ttf") format('truetype');
    font-weight: 700;
    font-style: normal;
}

body {
    font-family: 'Poppins';
    color: var(--content-color);
    font-size: ${queryParameters.get('fontsize')}px;
    margin-top: ${queryParameters.get('margintop')}px;
    margin-left: ${queryParameters.get('marginside')}px;
    margin-right: ${queryParameters.get('marginside')}px;
    margin-bottom: ${queryParameters.get('marginbottom')}px;
    user-select: none;
}

table {
    font-size: inherit;
}`));

const token = new URLSearchParams(window.location.search).get('token');

function requestAction(ident, value) {
    if (window.RequestAction) {
        window.RequestAction.postMessage(JSON.stringify({ ident, value }));
    } else {
        window.parent.postMessage({ ident, value, token: token }, '*');
    }
}

function openObject(objectID) {
    if (window.OpenObject) {
        window.OpenObject.postMessage(JSON.stringify({ objectID }));
    } else {
        window.parent.postMessage({ type: 'openObject', objectID: objectID, token: token }, '*');
    }

}

function translate(original) {
    if (navigator.languages && locale.translations) {
        for (let language of navigator.languages) {
            language = language.replace(/-/g, '_');
            if (locale.translations[language] && locale.translations[language][original]) {
                return locale.translations[language][original];
            }
            else {
                const baseLanguage = language.split('_')[0];
                if (locale.translations[baseLanguage] && locale.translations[baseLanguage][original]) {
                    return locale.translations[baseLanguage][original];
                }
                if (baseLanguage === 'en') {
                    break;
                }
            }
        }
    }
    return original;
}
function translateHTML(node) {
    if (node.hasChildNodes()) {
        for (const child of node.childNodes) {
            translateHTML(child);
        }
    }
    else {
        node.textContent = translate(node.textContent);
    }
}
window.addEventListener('message',
    (event) => {
        if (window.handleMessage) {
            window.handleMessage(event.data);
        }
    }, false
);
window.onload = () => {
    translateHTML(document);
};

let currentTouch = null;

const postScroll = (delta) => {
    if (window.Scroll) {
        window.Scroll.postMessage(JSON.stringify({ delta: delta }));
    } else {
        window.parent.postMessage({ type: 'scroll', delta: delta, token: token }, '*');
    }
};

const postPosition = (positionY, positionType) => {
    if (window.Position) {
        window.Position.postMessage(JSON.stringify({ position: positionY, positionType: positionType }));
    } else {
        window.parent.postMessage({ type: 'position', position: positionY, positionType: positionType, token: token }, '*');
    }
};

window.onwheel = (event) => {
    postScroll(event.deltaY);
};

addEventListener('touchstart',
    (event) => {
        // No need to register another touch if one is already active
        if (currentTouch || (event.touches.length === 0)) {
            return;
        }
        currentTouch = event.touches.item(0);
        postPosition(currentTouch.screenY, 'start');
    }
);

addEventListener('touchmove',
    (event) => {
        if ((event.touches.length === 0) || (!currentTouch)) {
            return;
        }
        for (let i = 0; i < event.touches.length; i++) {
            if (event.touches.item(i).identifier === currentTouch.identifier) {
                postPosition(event.touches.item(i).screenY, 'move');
                return;
            }
        }
    }
);

addEventListener('touchend',
    (event) => {
        if (!currentTouch) {
            return;
        }
        for (let i = 0; i < event.touches.length; i++) {
            // current touch is still active -> Do nothing
            if (event.touches.item(i).identifier === currentTouch.identifier) {
                return;
            }
        }
        currentTouch = null;
        postPosition(0, 'end');
    }
);
const locale = {};
