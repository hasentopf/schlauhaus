<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            margin: 3rem 0 0 0;
            background-color: #1a1a2e;
            color: #eee;
            background-image: url('https://schlauhaus.com/Schlauhaus-Energy-Monitor.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            background-color: rgba(255, 255, 255, 0.25);
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
            color: rgb(20, 28, 95);
        }
        th {
            background-color: rgba(31, 64, 104, 0.25);
            color: rgb(20, 28, 95);
        }
        tr:hover td {
            color: #F0F0F0;
        }
        tr:hover {
            background-color: #1f4068;
        }
        .total-row {
            font-weight: bold;
            background-color: #0f3460;
        }
        .section-title {
            font-size: 1em;
            margin: 10px 0 5px 0;
            color: #e94560;
        }
    </style>
</head>
<body>
{{CONTENT}}
</body>
</html>
