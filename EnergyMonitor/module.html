<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
            margin: 0;
            background-color: #1a1a2e;
            color: #eee;
            background-image: url('./Schlauhaus-Energy-Monitor.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .header {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #16213e;
            color: #00d4ff;
        }
        tr:hover {
            background-color: #1f4068;
        }
        .total-row {
            font-weight: bold;
            background-color: #0f3460;
        }
        .section-title {
            font-size: 1em;
            margin: 10px 0 5px 0;
            color: #e94560;
        }
    </style>
</head>
<body>
<div class="header">Energie Verbrauch</div>
{{CONTENT}}
</body>
</html>
