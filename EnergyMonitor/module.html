<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0 1rem;
            margin: 3rem 0 0 0;
            background: linear-gradient(180deg, rgb(84, 169, 245) 0%, rgb(84, 169, 245) 25%, rgb(204, 45, 246) 75%, rgb(238, 122, 141) 100%);
            color: #303a3e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            background-color: #ffffff;
        }
        table td.verbrauch {
            background-color: rgba(255, 255, 255, 0.85);
            background-repeat: no-repeat;
            background-position: right center;
            background-size: auto 80%;
            background-image: url('https://schlauhaus.com/schlauhaus/Schlauhaus-Haus.svg');
        }
        table td.ertrag {
            background-color: rgba(255, 255, 255, 0.85);
            background-repeat: no-repeat;
            background-position: right center;
            background-size: auto 80%;
            background-image: url('https://schlauhaus.com/schlauhaus/Schlauhaus-Solaranlage.svg');
        }
        table th.verbrauch {
            background-color: rgba(255, 255, 255, 0.9);
            background-repeat: no-repeat;
            background-position: right center;
            background-size: auto 80%;
            background-image: url('https://schlauhaus.com/schlauhaus/Schlauhaus-Haus.svg');
        }
        table th.ertrag {
            background-color: rgba(255, 255, 255, 0.9);
            background-repeat: no-repeat;
            background-position: right center;
            background-size: auto 80%;
            background-image: url('https://schlauhaus.com/schlauhaus/Schlauhaus-Solaranlage.svg');
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgb(228, 228, 228);
            color: #141c5f;
        }
        th {
            background-color: rgba(31, 64, 104, 0.25);
            color: #141c5f;
        }
        tr:hover td {
            color: #F0F0F0;
            background-color: #141c5f;
        }
    </style>
</head>
<body>
{{CONTENT}}
</body>
</html>
